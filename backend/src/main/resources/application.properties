# Database Configuration
spring.datasource.url=jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:mealmind_db};encrypt=true;trustServerCertificate=true
spring.datasource.username=${DB_USERNAME:SA}
spring.datasource.password=${DB_PASSWORD:MealMind@2024}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Server Configuration
server.port=8080

# JWT Configuration
app.jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.mealapp=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate=ERROR
logging.level.org.springframework.web=DEBUG

# OpenAI Configuration
# Set your OpenAI API key here or use environment variable OPENAI_API_KEY
openai.api.key=${OPENAI_API_KEY:sk-your-new-api-key-here}
